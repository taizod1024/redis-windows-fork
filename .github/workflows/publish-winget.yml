name: Publish to winget

on:
  workflow_dispatch:
    inputs:
      use_latest_tag:
        description: "Use latest Redis tag"
        default: true
        type: boolean
      tag_name:
        description: "Redis Version"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  submit-winget:
    runs-on: windows-latest
    env:
      WINGETCREATE_VERSION: 1.12.8.0

    steps:
      - name: Resolve release asset URL
        id: release
        run: |
          function Get-ReleaseByTag([string]$candidateTag) {
            $releaseApiUrl = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$candidateTag"
            return Invoke-RestMethod -Headers @{
              Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
              "User-Agent" = "redis-windows-msys2-winget"
            } -Uri $releaseApiUrl
          }

          function Get-LatestRedisTag() {
            $latestRedisReleaseUrl = "https://api.github.com/repos/redis/redis/releases/latest"
            $latestInfo = Invoke-RestMethod -Headers @{
              Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
              "User-Agent" = "redis-windows-msys2-winget"
            } -Uri $latestRedisReleaseUrl

            if ([string]::IsNullOrWhiteSpace($latestInfo.tag_name)) {
              throw "Unable to resolve latest Redis tag from redis/redis releases API."
            }

            return $latestInfo.tag_name
          }

          $useLatestTag = "${{ inputs.use_latest_tag }}" -eq "true"
          $inputTag = "${{ inputs.tag_name }}"

          if ($useLatestTag) {
            $inputTag = Get-LatestRedisTag
            Write-Output "Using latest Redis tag: $inputTag"
          }
          elseif ([string]::IsNullOrWhiteSpace($inputTag)) {
            throw "tag_name is required when use_latest_tag is false."
          }

          $tagsToTry = @($inputTag)
          if ($inputTag.StartsWith('v')) {
            $tagsToTry += $inputTag.TrimStart('v')
          }
          else {
            $tagsToTry += "v$inputTag"
          }

          $event = $null
          foreach ($candidateTag in $tagsToTry) {
            try {
              $event = Get-ReleaseByTag $candidateTag
              break
            }
            catch {
              $statusCode = $null
              try {
                $statusCode = [int]$_.Exception.Response.StatusCode
              }
              catch {
              }

              if ($statusCode -and $statusCode -ne 404) {
                throw "Release tag lookup failed for '$candidateTag' with status ${statusCode}: $($_.Exception.Message)"
              }

              Write-Output "Release tag lookup failed for '$candidateTag'. Trying next candidate..."
            }
          }

          if (-not $event) {
            throw "Unable to find release for input tag '$inputTag'. Tried both with and without 'v' prefix."
          }

          $tag = $event.tag_name
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = $event.release.tag_name
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Unable to resolve release tag from event payload."
          }

          $version = $tag.TrimStart('v')
          $assets = $event.assets
          if (-not $assets) {
            $assets = $event.release.assets
          }

          $asset = $assets | Where-Object { $_.name -like "*-msys2.zip" } | Select-Object -First 1

          if (-not $asset) {
            throw "No release asset matched '*-msys2.zip'."
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "asset_url=$($asset.browser_download_url)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install wingetcreate
        run: |
          $wingetCreateUrl = "https://github.com/microsoft/winget-create/releases/download/v$env:WINGETCREATE_VERSION/wingetcreate.exe"
          Invoke-WebRequest -Uri $wingetCreateUrl -OutFile wingetcreate.exe
          .\wingetcreate.exe info

      - name: Submit package to winget-pkgs
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN || secrets.GH_PAT }}
        run: |
          function Normalize-Token([string]$value) {
            if ([string]::IsNullOrWhiteSpace($value)) {
              return ""
            }
            # Remove accidental line breaks/spaces that break Authorization headers.
            return ($value -replace "`r|`n", "").Trim()
          }

          $id = "taizod1024.redis-windows-fork"
          $publisher = "taizod1024"
          $shortDescription = "Redis for Windows on MSYS2 runtime"
          $license = "MIT"
          $licenseUrl = "https://github.com/taizod1024/redis-windows-fork/blob/main/LICENSE"
          $version = "${{ steps.release.outputs.version }}"
          $url = "${{ steps.release.outputs.asset_url }}"

          # Validate auth token before invoking wingetcreate.
          $token = Normalize-Token $env:WINGET_TOKEN

          if ([string]::IsNullOrWhiteSpace($token)) {
            throw "No GitHub token is available for winget submission."
          }

          if ($token -notmatch '^[A-Za-z0-9_]+$') {
            throw "GitHub token contains invalid characters. Re-save WINGET_GITHUB_TOKEN/GH_PAT without line breaks or spaces."
          }

          Write-Output "Submitting to winget: $id $version"
          Write-Output "Installer URL: $url"

          # Fast path: package already exists in winget-pkgs.
          .\wingetcreate.exe update --urls $url --version $version $id --submit --token $token

          if ($LASTEXITCODE -eq 0) {
            Write-Output "Updated existing package successfully."
            exit 0
          }

          # Fallback path: first-time package registration.
          Write-Output "Package update failed. Trying first-time package registration flow..."

          function Remove-ControlChars([string]$value) {
            if ($null -eq $value) {
              return ""
            }

            $chars = $value.ToCharArray() | Where-Object { [int]$_ -ge 32 -and [int]$_ -ne 127 }
            return (-join $chars).Trim()
          }

          function Quote-Yaml([string]$value) {
            $clean = Remove-ControlChars $value
            $clean = $clean -replace "'", "''"
            return "'" + $clean + "'"
          }

          function Write-Manifest([string]$path, [string[]]$lines) {
            $lines -join "`n" | Out-File -FilePath $path -Encoding utf8
          }

          $manifestDir = Join-Path $pwd "winget-manifests"
          if (Test-Path $manifestDir) {
            Remove-Item -Path $manifestDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $manifestDir | Out-Null

          $installerPath = Join-Path $env:RUNNER_TEMP "redis-installer-$version.zip"
          if (Test-Path $installerPath) {
            Remove-Item -Path $installerPath -Force
          }
          Invoke-WebRequest -Uri $url -OutFile $installerPath
          $sha256 = (Get-FileHash -Path $installerPath -Algorithm SHA256).Hash

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead($installerPath)
          try {
            $redisServerEntry = $archive.Entries |
              Where-Object { $_.FullName -match '(?i)(^|/)redis-server\.exe$' } |
              Select-Object -First 1
          }
          finally {
            $archive.Dispose()
          }

          if (-not $redisServerEntry) {
            throw "Unable to find redis-server.exe in installer archive."
          }

          $nestedInstallerRelativePath = $redisServerEntry.FullName -replace '\\', '/'

          $qId = Quote-Yaml $id
          $qVersion = Quote-Yaml $version
          $qPublisher = Quote-Yaml $publisher
          $qPackageName = Quote-Yaml "redis-windows-fork"
          $qShortDescription = Quote-Yaml $shortDescription
          $qLicense = Quote-Yaml $license
          $qLicenseUrl = Quote-Yaml $licenseUrl
          $qUrl = Quote-Yaml $url
          $qSha256 = Quote-Yaml $sha256
          $qNestedInstallerRelativePath = Quote-Yaml $nestedInstallerRelativePath

          $idSegments = $id.Split('.')
          if ($idSegments.Count -lt 2) {
            throw "Package identifier must contain at least two segments (example: Publisher.Package)."
          }

          $identifierPath = Join-Path (Join-Path $manifestDir "manifests") $idSegments[0].Substring(0, 1).ToLowerInvariant()
          foreach ($segment in $idSegments) {
            $identifierPath = Join-Path $identifierPath $segment
          }

          $packagePath = Join-Path $identifierPath $version
          New-Item -ItemType Directory -Path $packagePath -Force | Out-Null

          $versionManifestPath = Join-Path $packagePath "$id.yaml"
          $installerManifestPath = Join-Path $packagePath "$id.installer.yaml"
          $localeManifestPath = Join-Path $packagePath "$id.locale.en-US.yaml"

          Write-Manifest $versionManifestPath @(
            '# yaml-language-server: $schema=https://aka.ms/winget-manifest.version.1.10.0.schema.json'
            "PackageIdentifier: $qId"
            "PackageVersion: $qVersion"
            'DefaultLocale: en-US'
            'ManifestType: version'
            'ManifestVersion: 1.10.0'
          )

          Write-Manifest $installerManifestPath @(
            '# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.10.0.schema.json'
            "PackageIdentifier: $qId"
            "PackageVersion: $qVersion"
            'InstallerType: zip'
            'NestedInstallerType: portable'
            'NestedInstallerFiles:'
            "  - RelativeFilePath: $qNestedInstallerRelativePath"
            '    PortableCommandAlias: redis-server'
            'Installers:'
            '  - Architecture: x64'
            "    InstallerUrl: $qUrl"
            "    InstallerSha256: $qSha256"
            'ManifestType: installer'
            'ManifestVersion: 1.10.0'
          )

          Write-Manifest $localeManifestPath @(
            '# yaml-language-server: $schema=https://aka.ms/winget-manifest.defaultLocale.1.10.0.schema.json'
            "PackageIdentifier: $qId"
            "PackageVersion: $qVersion"
            'PackageLocale: en-US'
            "Publisher: $qPublisher"
            "PackageName: $qPackageName"
            "ShortDescription: $qShortDescription"
            "License: $qLicense"
            "LicenseUrl: $qLicenseUrl"
            'ManifestType: defaultLocale'
            'ManifestVersion: 1.10.0'
          )

          .\wingetcreate.exe submit --prtitle "Add $id version $version" --token $token --no-open $packagePath

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to submit package manifest to winget-pkgs."
          }

          Write-Output "Created and submitted first-time package manifest successfully."
