name: Publish to winget

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to submit (example: 8.6.3 or v8.6.3)"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  submit-winget:
    # Skip prerelease tags because winget-pkgs only accepts stable versions.
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    runs-on: windows-latest
    env:
      PACKAGE_IDENTIFIER: taizod1024.redis-windows
      PACKAGE_PUBLISHER: taizod1024
      PACKAGE_NAME: ${{ vars.WINGET_PACKAGE_NAME }}
      PACKAGE_SHORT_DESCRIPTION: ${{ vars.WINGET_PACKAGE_SHORT_DESCRIPTION }}
      PACKAGE_LICENSE: ${{ vars.WINGET_PACKAGE_LICENSE }}
      PACKAGE_LICENSE_URL: ${{ vars.WINGET_PACKAGE_LICENSE_URL }}

    steps:
      - name: Validate winget configuration
        run: |
          $tokenSource = "${{ secrets.WINGET_GITHUB_TOKEN }}"
          if ([string]::IsNullOrWhiteSpace($tokenSource)) {
            $tokenSource = "${{ secrets.GH_PAT }}"
          }
          if ([string]::IsNullOrWhiteSpace($tokenSource)) {
            Write-Output "WINGET_GITHUB_TOKEN/GH_PAT is not set. Fallback to github.token will be used."
          }

      - name: Resolve release asset URL
        id: release
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.release_tag }}"
            if ([string]::IsNullOrWhiteSpace($tag)) {
              throw "workflow_dispatch requires release_tag input."
            }

            $releaseApiUrl = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag"
            $event = Invoke-RestMethod -Headers @{
              Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
              "User-Agent" = "redis-windows-msys2-winget"
            } -Uri $releaseApiUrl
          }
          else {
            $event = Get-Content -Raw $env:GITHUB_EVENT_PATH | ConvertFrom-Json
          }

          $tag = $event.tag_name
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = $event.release.tag_name
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Unable to resolve release tag from event payload."
          }

          $version = $tag.TrimStart('v')
          $assets = $event.assets
          if (-not $assets) {
            $assets = $event.release.assets
          }

          $asset = $assets | Where-Object { $_.name -like "*-msys2.zip" } | Select-Object -First 1

          if (-not $asset) {
            throw "No release asset matched '*-msys2.zip'."
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "asset_name=$($asset.name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "asset_url=$($asset.browser_download_url)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install wingetcreate
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile wingetcreate.exe
          .\wingetcreate.exe info

      - name: Submit package to winget-pkgs
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN || secrets.GH_PAT || github.token }}
        run: |
          $id = $env:PACKAGE_IDENTIFIER
          $publisher = $env:PACKAGE_PUBLISHER
          $packageName = if ([string]::IsNullOrWhiteSpace($env:PACKAGE_NAME)) { "redis-windows" } else { $env:PACKAGE_NAME }
          $shortDescription = if ([string]::IsNullOrWhiteSpace($env:PACKAGE_SHORT_DESCRIPTION)) { "Redis for Windows on MSYS2 runtime" } else { $env:PACKAGE_SHORT_DESCRIPTION }
          $license = if ([string]::IsNullOrWhiteSpace($env:PACKAGE_LICENSE)) { "MIT" } else { $env:PACKAGE_LICENSE }
          $licenseUrl = if ([string]::IsNullOrWhiteSpace($env:PACKAGE_LICENSE_URL)) { "https://github.com/taizod1024/redis-windows/blob/main/LICENSE" } else { $env:PACKAGE_LICENSE_URL }
          $version = "${{ steps.release.outputs.version }}"
          $url = "${{ steps.release.outputs.asset_url }}"

          if ([string]::IsNullOrWhiteSpace($env:WINGET_TOKEN)) {
            throw "No GitHub token is available for winget submission."
          }

          Write-Output "Submitting to winget: $id $version"
          Write-Output "Installer URL: $url"

          .\wingetcreate.exe update --urls $url --version $version $id --submit --token $env:WINGET_TOKEN

          if ($LASTEXITCODE -eq 0) {
            Write-Output "Updated existing package successfully."
            exit 0
          }

          Write-Output "Package update failed. Trying first-time package registration flow..."

          $manifestDir = Join-Path $pwd "winget-manifests"
          if (Test-Path $manifestDir) {
            Remove-Item -Path $manifestDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $manifestDir | Out-Null

          $installerPath = Join-Path $manifestDir "installer.zip"
          Invoke-WebRequest -Uri $url -OutFile $installerPath
          $sha256 = (Get-FileHash -Path $installerPath -Algorithm SHA256).Hash

          $packagePath = Join-Path $manifestDir "manifests/t/taizod1024/redis-windows/$version"
          New-Item -ItemType Directory -Path $packagePath -Force | Out-Null

          $versionManifestPath = Join-Path $packagePath "taizod1024.redis-windows.yaml"
          $installerManifestPath = Join-Path $packagePath "taizod1024.redis-windows.installer.yaml"
          $localeManifestPath = Join-Path $packagePath "taizod1024.redis-windows.locale.en-US.yaml"

          @(
            "PackageIdentifier: $id"
            "PackageVersion: $version"
            "DefaultLocale: en-US"
            "ManifestType: version"
            "ManifestVersion: 1.10.0"
          ) -join "`n" | Set-Content -Path $versionManifestPath

          @(
            "PackageIdentifier: $id"
            "PackageVersion: $version"
            "InstallerType: zip"
            "NestedInstallerType: portable"
            "NestedInstallerFiles:"
            "  - RelativeFilePath: Redis-$version-Windows-x64-msys2/redis-server.exe"
            "    PortableCommandAlias: redis-server"
            "Installers:"
            "  - Architecture: x64"
            "    InstallerUrl: $url"
            "    InstallerSha256: $sha256"
            "ManifestType: installer"
            "ManifestVersion: 1.10.0"
          ) -join "`n" | Set-Content -Path $installerManifestPath

          @(
            "PackageIdentifier: $id"
            "PackageVersion: $version"
            "PackageLocale: en-US"
            "Publisher: $publisher"
            "PackageName: $packageName"
            "ShortDescription: $shortDescription"
            "License: $license"
            "LicenseUrl: $licenseUrl"
            "ManifestType: defaultLocale"
            "ManifestVersion: 1.10.0"
          ) -join "`n" | Set-Content -Path $localeManifestPath

          .\wingetcreate.exe submit --prtitle "Add $id version $version" --token $env:WINGET_TOKEN --no-open $manifestDir

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to submit new package manifest to winget-pkgs."
          }
